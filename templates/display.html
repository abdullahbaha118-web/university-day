<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>أحلام الطلاب 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ════════════════════════════════════════
   TUNING — edit these values freely
════════════════════════════════════════ */
:root{
  --bg:#2d2d2d;
  --font:'Cairo',sans-serif;

  /* circle diameter */
  --D:220px;

  /* font sizes inside circle — increase to make bigger */
  --F-EMOJI: 2.0rem;
  --F-NAME:  1.2rem;
  --F-DREAM: 1.2rem;
  --F-META:  1.2rem;
}

html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:#fff}

/* ── header ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:50;height:72px;
  background:rgba(20,20,20,.9);backdrop-filter:blur(18px);
  border-bottom:2px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
}
.htitle{
  font-size:1.9rem;font-weight:900;
  background:linear-gradient(135deg,#e91e8c,#00bcd4,#ffd600);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hright{display:flex;align-items:center;gap:14px}
.live{display:flex;align-items:center;gap:7px;font-size:.85rem;font-weight:700;color:#ccc}
.ldot{width:10px;height:10px;background:#4caf50;border-radius:50%;animation:lp 1.4s ease-in-out infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.6)}50%{box-shadow:0 0 0 7px rgba(76,175,80,0)}}
.cnt{background:linear-gradient(135deg,#e91e8c,#ab47bc);border-radius:999px;padding:6px 18px;font-size:.85rem;font-weight:800;box-shadow:0 4px 14px rgba(233,30,140,.3)}

/* ── stage ── */
.stage{position:fixed;top:72px;left:0;right:0;bottom:42px;overflow:hidden}

/* ── empty ── */
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.35);font-size:1.1rem;font-weight:700}
.empty-icon{font-size:5rem;animation:ef 3s ease-in-out infinite}
@keyframes ef{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}

/* ════════════════════════════════════════
   BUBBLE — perfectly round, sketch layout
   Emoji (static) → Name → Dream → Meta
════════════════════════════════════════ */
.bubble{
  position:absolute;
  width:var(--D);
  height:var(--D);
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:12px 10px;
  cursor:default;
  will-change:left,top;
  border:3px solid rgba(255,255,255,.3);
  box-shadow:0 10px 36px rgba(0,0,0,.45), 0 2px 0 rgba(255,255,255,.2) inset;
  overflow:hidden;
  animation:bIn .45s cubic-bezier(.34,1.56,.64,1) both;
  /* NO transition on left/top — JS moves it directly */
}
@keyframes bIn{
  0%  {opacity:0;transform:scale(0) rotate(-10deg)}
  80% {opacity:1;transform:scale(1.08) rotate(2deg)}
  100%{opacity:1;transform:scale(1) rotate(0deg)}
}

/* ── 8 colour gradients ── */
.bc0{background:radial-gradient(circle at 38% 32%,#f48fb1,#c2185b)}  /* deep pink   */
.bc1{background:radial-gradient(circle at 38% 32%,#80deea,#00838f)}  /* teal        */
.bc2{background:radial-gradient(circle at 38% 32%,#fff59d,#f9a825)}  /* yellow      */
.bc3{background:radial-gradient(circle at 38% 32%,#c8e6c9,#388e3c)}  /* green       */
.bc4{background:radial-gradient(circle at 38% 32%,#ffccbc,#d84315)}  /* orange      */
.bc5{background:radial-gradient(circle at 38% 32%,#f5f5f5,#757575)}  /* grey-white  */
.bc6{background:radial-gradient(circle at 38% 32%,#e1bee7,#7b1fa2)}  /* purple      */
.bc7{background:radial-gradient(circle at 38% 32%,#ffcdd2,#b71c1c)}  /* red         */

/* dark text for light bubbles */
.bc2 .b-name,.bc2 .b-dream,.bc2 .b-meta,
.bc3 .b-name,.bc3 .b-dream,.bc3 .b-meta,
.bc5 .b-name,.bc5 .b-dream,.bc5 .b-meta{color:#1a1a1a}
.bc2 .b-meta,.bc3 .b-meta,.bc5 .b-meta{color:rgba(0,0,0,.65)}
.bc2 .b-row,.bc3 .b-row,.bc5 .b-row{background:rgba(0,0,0,.1)}

/* ── inner elements ── */
.b-emoji{
  font-size:var(--F-EMOJI);
  line-height:1;
  margin-bottom:4px;
  display:block;
  /* STATIC — no rotation */
}
.b-row{
  background:rgba(255,255,255,.22);
  border-radius:6px;
  padding:2px 7px;
  margin-bottom:3px;
  max-width:92%;
  width:92%;
}
.b-name{
  font-size:var(--F-NAME);
  font-weight:900;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.2;
}
.b-dream{
  font-size:var(--F-DREAM);
  font-weight:700;
  color:#fff;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  word-break:break-word;
  line-height:1.25;
}
.b-meta{
  font-size:var(--F-META);
  font-weight:700;
  color:rgba(255,255,255,.88);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:86%;
  display:block;
  line-height:1.2;
}

/* ── ticker ── */
.ticker{
  position:fixed;bottom:0;left:0;right:0;z-index:50;height:42px;
  background:rgba(12,12,12,.93);
  border-top:2px solid rgba(255,255,255,.06);
  overflow:hidden;display:flex;align-items:center;
}
.ticker-track{display:flex;gap:80px;animation:tick 32s linear infinite;white-space:nowrap}
.ticker-item{
  font-size:.86rem;font-weight:700;
  background:linear-gradient(90deg,#e91e8c,#00bcd4,#ffd600,#4caf50);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style>
</head>
<body>

<header class="header">
  <div class="htitle">🌟 أحلام الطلاب</div>
  <div class="hright">
    <div class="live"><span class="ldot"></span>مباشر</div>
    <div class="cnt"><span id="cnt"></span></div>
  </div>
</header>

<main class="stage" id="stage">
  <div class="empty" id="empty">
    <div class="empty-icon">💭</div>
    <div>في انتظار أحلام الطلاب...</div>
    <div style="font-size:.88rem;opacity:.5">امسح QR Code وشارك حلمك!</div>
  </div>
</main>

<div class="ticker">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<script>
// ════════════════════════════════════════
//  PHYSICS SETTINGS
// ════════════════════════════════════════
const DIAMETER  = 190;    // must match --D in CSS
const RADIUS    = DIAMETER / 2;
const MAX_B     = 15;
const BASE_SPD  = 0.58;   // normal travel speed
const POLL_MS   = 1800;
const HEADER_H  = 72;
const TICKER_H  = 42;
const PAD       = 6;

// Overlap / phase-through settings
// When two balls collide, they briefly overlap (phase through each other)
// then elastically separate. This gives the "melt-into-each-other" look.
const OVERLAP_DEPTH = RADIUS * 0.55;  // how far they can overlap before pushing back
const OVERLAP_ALPHA = 0.85;           // opacity during deep overlap (subtle effect)

// ════════════════════════════════════════
//  SOUND
// ════════════════════════════════════════
const popAudio = document.getElementById('popSnd');

function playPop(){
  if(!popAudio) return;
  try{
    popAudio.currentTime = 0;
    popAudio.play().catch(()=>{});
  } catch(e){}
}

// unlock on first interaction
document.addEventListener('click', ()=>{ popAudio.load(); }, {once:true});

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const bubbles  = new Map();
const stage    = document.getElementById('stage');
const cntEl    = document.getElementById('cnt');
const empty    = document.getElementById('empty');
let   knownIds = new Set();
let   rafId    = null;

function bounds(){
  return { w: window.innerWidth, h: window.innerHeight - HEADER_H - TICKER_H };
}

// ── colour picker — avoids repeating last 3 colours ──
const usedCols = [];
function pickCol(){
  const avoid = usedCols.slice(-3);
  const pool  = [...Array(8).keys()].filter(c=>!avoid.includes(c));
  const pick  = pool.length
    ? pool[Math.floor(Math.random()*pool.length)]
    : Math.floor(Math.random()*8);
  usedCols.push(pick); if(usedCols.length>20) usedCols.shift();
  return pick;
}

// ── find non-overlapping start position ──
function findPos(){
  const {w,h} = bounds();
  const D = DIAMETER;
  for(let t=0; t<300; t++){
    const x = PAD + Math.random() * Math.max(1, w-D-PAD*2);
    const y = PAD + Math.random() * Math.max(1, h-D-PAD*2);
    let ok = true;
    for(const b of bubbles.values()){
      const dx=b.cx()-x-RADIUS, dy=b.cy()-y-RADIUS;
      if(Math.sqrt(dx*dx+dy*dy) < D+10){ ok=false; break; }
    }
    if(ok) return {x,y};
  }
  return {
    x: PAD + Math.random()*Math.max(1,bounds().w-DIAMETER-PAD*2),
    y: PAD + Math.random()*Math.max(1,bounds().h-DIAMETER-PAD*2)
  };
}

function randVel(){
  const ang = Math.random()*Math.PI*2;
  return { vx: Math.cos(ang)*BASE_SPD, vy: Math.sin(ang)*BASE_SPD };
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── build element ──
function mkEl(d){
  const el  = document.createElement('div');
  el.className = 'bubble bc' + pickCol();

  const dRow = d.dept     ? '<span class="b-meta">🏫 '+esc(d.dept)+'</span>'     : '';
  const bRow = d.birthday ? '<span class="b-meta">🎂 '+esc(d.birthday)+'</span>' : '';

  el.innerHTML =
    '<span class="b-emoji">'+d.emoji+'</span>'+
    '<div class="b-row"><div class="b-name">'+esc(d.name)+'</div></div>'+
    '<div class="b-row"><div class="b-dream">'+esc(d.dream)+'</div></div>'+
    dRow + bRow +
    '<span class="b-meta">♈ '+esc(d.zodiac)+'</span>';
  return el;
}

// ════════════════════════════════════════
//  BUBBLE OBJECT
// ════════════════════════════════════════
function makeBubble(d){
  const {x,y}   = findPos();
  const {vx,vy} = randVel();
  const el       = mkEl(d);

  const b = {
    el,
    x, y,     // top-left corner position
    vx, vy,
    cx(){ return this.x + RADIUS; },
    cy(){ return this.y + RADIUS; },
    overlapTimer: 0   // counts frames of deep overlap for visual effect
  };

  el.style.left = x+'px';
  el.style.top  = y+'px';
  stage.appendChild(el);
  return b;
}

// ── add ──
function addBubble(d){
  if(bubbles.has(d.id)) return;
  if(bubbles.size >= MAX_B){
    const oldest = bubbles.keys().next().value;
    removeBubble(oldest);
  }
  const b = makeBubble(d);
  bubbles.set(d.id, b);
  empty.style.display = 'none';
  cntEl.textContent   = bubbles.size;

  // Play pop sound in sync with bubble appear animation
  // Animation is 0.45s — sound fires immediately with bubble
  playPop();

  if(!rafId) startLoop();
}

// ── remove ──
function removeBubble(id){
  const b = bubbles.get(id);
  if(!b) return;
  b.el.style.transition = 'opacity .3s,transform .3s';
  b.el.style.opacity    = '0';
  b.el.style.transform  = 'scale(0)';
  setTimeout(()=>b.el.remove(), 340);
  bubbles.delete(id);
  cntEl.textContent = bubbles.size;
  if(bubbles.size===0){
    empty.style.display='';
    cancelAnimationFrame(rafId); rafId=null;
  }
}

// ════════════════════════════════════════
//  PHYSICS LOOP
//  Each ball moves at constant speed.
//  On collision:
//   - If overlap < OVERLAP_DEPTH → soft push (they ease through each other)
//   - If overlap >= OVERLAP_DEPTH → elastic bounce (they reflect apart)
//  This creates the "melt-into-then-bounce" effect you asked for.
// ════════════════════════════════════════
function startLoop(){
  function tick(){
    const {w,h} = bounds();

    // ── move & wall bounce ──
    for(const [,b] of bubbles){
      b.x += b.vx;
      b.y += b.vy;

      if(b.x < PAD)               { b.x = PAD;              b.vx =  Math.abs(b.vx); }
      if(b.x > w-DIAMETER-PAD)    { b.x = w-DIAMETER-PAD;  b.vx = -Math.abs(b.vx); }
      if(b.y < PAD)               { b.y = PAD;              b.vy =  Math.abs(b.vy); }
      if(b.y > h-DIAMETER-PAD)    { b.y = h-DIAMETER-PAD;  b.vy = -Math.abs(b.vy); }

      // maintain constant speed
      const spd = Math.sqrt(b.vx*b.vx+b.vy*b.vy)||0.01;
      b.vx = (b.vx/spd)*BASE_SPD;
      b.vy = (b.vy/spd)*BASE_SPD;

      b.el.style.left = b.x+'px';
      b.el.style.top  = b.y+'px';
    }

    // ── collision detection & response ──
    const arr = [...bubbles.values()];
    for(let i=0; i<arr.length; i++){
      for(let j=i+1; j<arr.length; j++){
        const a = arr[i], b2 = arr[j];

        const dx   = b2.cx() - a.cx();
        const dy   = b2.cy() - a.cy();
        const dist = Math.sqrt(dx*dx+dy*dy) || 0.001;
        const overlap = DIAMETER - dist;   // positive = overlapping

        if(overlap <= 0) continue;         // no contact

        const nx = dx/dist, ny = dy/dist; // unit normal

        if(overlap < OVERLAP_DEPTH){
          // ── SOFT PHASE-THROUGH ZONE ──
          // They're merging into each other — apply only a tiny push,
          // let them continue sliding through.
          const softPush = 0.04;
          a.vx  -= nx * softPush;
          a.vy  -= ny * softPush;
          b2.vx += nx * softPush;
          b2.vy += ny * softPush;

          // slight opacity pulse to show overlap (visual cue)
          a.el.style.opacity  = (0.75 + Math.random()*0.15).toFixed(2);
          b2.el.style.opacity = (0.75 + Math.random()*0.15).toFixed(2);

        } else {
          // ── DEEP OVERLAP → ELASTIC BOUNCE ──
          // They've overlapped enough — now bounce apart properly.

          // Separate positions so they don't stick
          const sep = (overlap - OVERLAP_DEPTH) * 0.5;
          a.x  -= nx * sep;  a.y  -= ny * sep;
          b2.x += nx * sep;  b2.y += ny * sep;

          // Elastic velocity exchange (equal mass)
          const relVx = b2.vx - a.vx;
          const relVy = b2.vy - a.vy;
          const dot   = relVx*nx + relVy*ny;

          if(dot < 0){
            a.vx  += dot*nx;   a.vy  += dot*ny;
            b2.vx -= dot*nx;   b2.vy -= dot*ny;

            // restore constant speed after bounce
            const sa = Math.sqrt(a.vx*a.vx+a.vy*a.vy)||0.01;
            a.vx  = (a.vx/sa)*BASE_SPD;  a.vy  = (a.vy/sa)*BASE_SPD;
            const sb = Math.sqrt(b2.vx*b2.vx+b2.vy*b2.vy)||0.01;
            b2.vx = (b2.vx/sb)*BASE_SPD; b2.vy = (b2.vy/sb)*BASE_SPD;
          }

          // restore opacity
          a.el.style.opacity  = '1';
          b2.el.style.opacity = '1';
        }
      }
    }

    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

// ── ticker ──
const MOTIV=[
  "🌟 تم التطوير بواسطة","💫عبدالاله بهاء",
  "🌺عباس عقيل ","🌺يوسف كاظم ",
  "🏆 Claude Ai",
  
];
(function(){
  const t=document.getElementById('tickerTrack');
  [...MOTIV,...MOTIV].forEach(m=>{
    const s=document.createElement('span');
    s.className='ticker-item';s.textContent=m;t.appendChild(s);
  });
})();

// ── polling ──
async function poll(){
  try{
    const list = await (await fetch('/api/dreams')).json();
    list.forEach(d=>{ if(!knownIds.has(d.id)){ knownIds.add(d.id); addBubble(d); }});
    const sids = new Set(list.map(d=>d.id));
    for(const id of [...bubbles.keys()]){ if(!sids.has(id)) removeBubble(id); }
  } catch(e){ console.warn('poll',e); }
  setTimeout(poll, POLL_MS);
}
poll();

window.addEventListener('resize',()=>{
  const{w,h}=bounds();
  const D=DIAMETER;
  for(const b of bubbles.values()){
    if(b.x>w-D-PAD) b.x=w-D-PAD;
    if(b.y>h-D-PAD) b.y=h-D-PAD;
  }
});
</script>
